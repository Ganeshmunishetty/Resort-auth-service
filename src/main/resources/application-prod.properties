# ===============================
# PRODUCTION ENVIRONMENT
# ===============================
server.port=${SERVER_PORT:8081}
spring.application.name=auth-service

# ===============================
# DATABASE CONFIG (MySQL - PROD)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# CONNECTION POOL (Production Optimized)
# ===============================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=AuthHikariPool
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=60000

# ===============================
# JWT CONFIG (MUST BE SET VIA ENV)
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expirationMs=${JWT_EXPIRATION_MS:3600000}
jwt.refresh.expirationMs=${JWT_REFRESH_EXPIRATION_MS:86400000}

# ===============================
# PASSWORD RESET
# ===============================
password.reset.token.expirationMs=${PASSWORD_RESET_EXPIRATION_MS:900000}

# ===============================
# RATE LIMITING
# ===============================
rate.limit.login.capacity=${RATE_LIMIT_CAPACITY:5}
rate.limit.login.refill.tokens=${RATE_LIMIT_TOKENS:5}
rate.limit.login.refill.minutes=${RATE_LIMIT_MINUTES:1}

# ===============================
# ACCOUNT LOCKOUT
# ===============================
account.lockout.max.attempts=${LOCKOUT_MAX_ATTEMPTS:5}
account.lockout.duration.minutes=${LOCKOUT_DURATION_MINUTES:30}

# ===============================
# LOGGING (Production - JSON format)
# ===============================
logging.level.root=WARN
logging.level.com.example.auth=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{correlationId}] %logger{36} - %msg%n

# ===============================
# ACTUATOR (Secured)
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# ===============================
# SECURITY HEADERS
# ===============================
server.error.include-message=never
server.error.include-stacktrace=never

# ===============================
# CORS (Configure for your frontend domain)
# ===============================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# ===============================
# EMAIL (Production)
# ===============================
spring.mail.enabled=${MAIL_ENABLED:true}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
app.frontend.url=${FRONTEND_URL:https://yourdomain.com}

# ===============================
# API DOCUMENTATION (Disabled in production)
# ===============================
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

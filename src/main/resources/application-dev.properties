# ===============================
# DEVELOPMENT ENVIRONMENT
# ===============================
server.port=8081
spring.application.name=auth-service

# ===============================
# DATABASE CONFIG (MySQL - DEV)
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/resort_auth?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:MMnandish@97}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# CONNECTION POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=AuthHikariPool
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET:dev-secret-key-minimum-256-bits-required-for-production-use-only}
jwt.expirationMs=${JWT_EXPIRATION_MS:3600000}
jwt.refresh.expirationMs=${JWT_REFRESH_EXPIRATION_MS:86400000}

# ===============================
# PASSWORD RESET
# ===============================
password.reset.token.expirationMs=900000

# ===============================
# RATE LIMITING
# ===============================
rate.limit.login.capacity=5
rate.limit.login.refill.tokens=5
rate.limit.login.refill.minutes=1

# ===============================
# ACCOUNT LOCKOUT
# ===============================
account.lockout.max.attempts=5
account.lockout.duration.minutes=30

# ===============================
# LOGGING (Development)
# ===============================
logging.level.root=INFO
logging.level.com.example.auth=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===============================
# CORS
# ===============================
cors.allowed.origins=http://localhost:5173,http://localhost:3000

# ===============================
# EMAIL (Disabled by default in dev)
# ===============================
spring.mail.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.frontend.url=http://localhost:3000

# ===============================
# API DOCUMENTATION
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
